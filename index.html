<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
<title>PaperTrade — AI Day Trading</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400&family=Syne:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
  :root {
    --bg: #FAFAFA; --bg2: #F4F4F4; --bg3: #EBEBEB; --bg4: #DCDCDC;
    --border: rgba(0,0,0,0.07); --text: #111111; --text2: #555555; --text3: #999999;
    --green: #1a7a4a; --red: #c0243a; --accent: #3d35c8; --radius: 10px;
    --font-display: 'Syne', sans-serif; --font-mono: 'Space Mono', monospace;
  }
  
  /* Navigation Bar Styling */
  .nav {
    position: fixed; bottom: 0; left: 50%; transform: translateX(-50%);
    width: 100%; max-width: 420px; display: flex;
    border-top: 1px solid var(--border); background: var(--bg2); z-index: 50;
  }
  .nit { flex: 1; padding: 10px 0 8px; text-align: center; cursor: pointer; }
  .nic { font-size: 16px; margin-bottom: 3px; color: var(--text3); }
  .nlb { font-size: 9px; color: var(--text3); font-family: var(--font-display); font-weight: 600; text-transform: uppercase; }
  .nit.on .nic, .nit.on .nlb { color: var(--green); }

  /* Tab Visibility */
  .sec { display: none; padding: 14px; }
  .sec.on { display: block; }
  
  /* Rest of your styles... */
  body { background: var(--bg); color: var(--text); font-family: var(--font-mono); }
  .app { max-width: 420px; margin: 0 auto; min-height: 100vh; position: relative; }
</style>
</head>
<body>

<div class="app">
  <div class="stats" id="stats-bar">
    <div class="st"><div class="stl">Equity</div><div id="stat-equity" class="stv">$10,000.00</div></div>
    <div class="st"><div class="stl">P&L</div><div id="stat-pnl" class="stv">$0.00</div></div>
    <div class="st"><div class="stl">Cash</div><div id="stat-cash" class="stv">$10,000.00</div></div>
  </div>

  <div class="content">
    <div id="tab-ai" class="sec on"><h2>AI Picks</h2><div id="ai-list"></div></div>
    <div id="tab-crypto" class="sec"><h2>Crypto Market</h2><div id="crypto-list"></div></div>
    <div id="tab-market" class="sec"><h2>Stock Market</h2><div id="market-list"></div></div>
    <div id="tab-portfolio" class="sec"><h2>My Portfolio</h2><div id="port-list"></div></div>
    <div id="tab-history" class="sec"><h2>Trade History</h2><div id="hist-list"></div></div>
  </div>

  <nav class="nav">
    <div class="nit on" onclick="sw('ai')">
      <div class="nic">★</div><div class="nlb">AI Picks</div>
    </div>
    <div class="nit" onclick="sw('crypto')">
      <div class="nic">◈</div><div class="nlb">Crypto</div>
    </div>
    <div class="nit" onclick="sw('market')">
      <div class="nic">▦</div><div class="nlb">Market</div>
    </div>
    <div class="nit" onclick="sw('portfolio')">
      <div class="nic">◆</div><div class="nlb">Portfolio</div>
    </div>
    <div class="nit" onclick="sw('history')">
      <div class="nic">↺</div><div class="nlb">History</div>
    </div>
  </nav>
</div>

<script>
// Switch between the 5 tabs
function sw(t) {
  document.querySelectorAll('.sec').forEach(s => s.classList.remove('on'));
  document.querySelectorAll('.nit').forEach(n => n.classList.remove('on'));
  
  const targetSec = document.getElementById('tab-' + t);
  if (targetSec) targetSec.classList.add('on');
  
  // Find the clicked nav item and highlight it
  event.currentTarget.classList.add('on');
}

// Initial Stats Update
function updateStats() {
  // Add your logic here to calculate Equity and P&L
}
</script>
</body>
</html>
