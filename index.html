<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
<title>PaperTrade — Fixed P&L</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@700&display=swap" rel="stylesheet"/>
<style>
  :root { --bg: #FAFAFA; --bg2: #F4F4F4; --text: #111111; --text3: #999999; --green: #1a7a4a; --red: #c0243a; --border: rgba(0,0,0,0.07); --font-mono: 'Space Mono', monospace; }
  body { background: var(--bg); color: var(--text); font-family: var(--font-mono); margin: 0; padding: 0; font-size: 13px; }
  .hdr { padding: 16px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
  .stats { display: grid; grid-template-columns: repeat(4, 1fr); background: var(--border); border-bottom: 1px solid var(--border); }
  .st { background: var(--bg); padding: 10px; border-right: 1px solid var(--border); }
  .stl { font-size: 9px; color: var(--text3); text-transform: uppercase; }
  .stv { font-size: 11px; font-weight: 700; }
  .pos { color: var(--green); } .neg { color: var(--red); }
  .card { background: var(--bg2); margin: 10px; padding: 12px; border-radius: 8px; border: 1px solid var(--border); }
  .btn { width: 100%; padding: 12px; margin-top: 10px; cursor: pointer; border: none; font-weight: bold; }
</style>
</head>
<body>

<div class="hdr"><div style="font-weight:800; font-size:18px;">PaperTrade</div></div>

<div class="stats">
  <div class="st"><div class="stl">Equity</div><div id="stat-equity" class="stv">$10,000.00</div></div>
  <div class="st"><div class="stl">P&L</div><div id="stat-pnl" class="stv">$0.00</div></div>
  <div class="st"><div class="stl">Perf</div><div id="stat-pct" class="stv">0.00%</div></div>
  <div class="st"><div class="stl">Cash</div><div id="stat-cash" class="stv">$10,000.00</div></div>
</div>

<div id="portfolio-list">
  <div class="card">
    <div style="font-weight:bold;">AAPL</div>
    <div style="font-size:11px; color:#666;">Sample Position</div>
    <button class="btn" style="background:var(--green); color:white;" onclick="buy('AAPL', 150)">Buy 10 Shares @ $150</button>
  </div>
</div>

<script>
let cash = 10000, capital = 10000, longs = {}, tradeHistory = [];
let prices = { "AAPL": 155 }; // Current market price is $155

function updateStats() {
  let marketValue = 0;
  for (let s in longs) {
    marketValue += (prices[s] || 0) * longs[s];
  }

  const equity = cash + marketValue;
  const pnl = equity - capital;
  const pct = (pnl / capital) * 100;

  document.getElementById('stat-equity').innerText = "$" + equity.toLocaleString();
  document.getElementById('stat-cash').innerText = "$" + cash.toLocaleString();
  
  const pnlEl = document.getElementById('stat-pnl');
  pnlEl.innerText = (pnl >= 0 ? "+" : "") + "$" + pnl.toLocaleString();
  pnlEl.className = "stv " + (pnl >= 0 ? "pos" : "neg");

  const pctEl = document.getElementById('stat-pct');
  pctEl.innerText = (pnl >= 0 ? "+" : "") + pct.toFixed(2) + "%";
  pctEl.className = "stv " + (pnl >= 0 ? "pos" : "neg");
}

function buy(sym, price) {
  if (cash >= price * 10) {
    cash -= price * 10;
    longs[sym] = (longs[sym] || 0) + 10;
    updateStats();
    alert("Bought 10 shares of " + sym);
  }
}

// Initial Run
updateStats();
</script>
</body>
</html>
